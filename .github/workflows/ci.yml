name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: # manual release trigger (e.g. after a GITHUB_TOKEN-merged PR)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12
      - run: go test -race -cover ./...
      - run: CGO_ENABLED=0 go build ./...

  # Automatic releasing: every push to main becomes a patch release, versioned
  # from git tags (no version-bump commits, so no workflow loops). Commit
  # message markers steer it: [skip release], [release minor], [release major].
  release:
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version from tags
        id: version
        run: |
          set -euo pipefail
          msg="$(git log -1 --pretty=%B)"
          if echo "$msg" | grep -qiF '[skip release]'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "release skipped by commit message"
            exit 0
          fi
          latest="$(git tag --list 'v*' --sort=-v:refname | head -n1)"
          if [ -z "$latest" ]; then
            next="0.1.0"
          else
            base="${latest#v}"
            IFS=. read -r MA MI PA <<< "$base"
            if echo "$msg" | grep -qiF '[release major]'; then
              next="$((MA+1)).0.0"
            elif echo "$msg" | grep -qiF '[release minor]'; then
              next="$MA.$((MI+1)).0"
            else
              next="$MA.$MI.$((PA+1))"
            fi
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "next=$next" >> "$GITHUB_OUTPUT"
          echo "releasing v$next (previous: ${latest:-none})"

      - name: Set up Docker Buildx
        if: steps.version.outputs.skip == 'false'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.version.outputs.skip == 'false'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        if: steps.version.outputs.skip == 'false'
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:v${{ steps.version.outputs.next }}
            ghcr.io/${{ github.repository }}:latest
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Scan image
        if: steps.version.outputs.skip == 'false'
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ghcr.io/${{ github.repository }}:v${{ steps.version.outputs.next }}
          severity: HIGH,CRITICAL
          exit-code: "0"

      - name: Create tag + GitHub release
        if: steps.version.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.version.outputs.next }}" \
            --title "v${{ steps.version.outputs.next }}" \
            --generate-notes \
            --notes "Image: \`ghcr.io/${{ github.repository }}:v${{ steps.version.outputs.next }}\`"
