# Kustomization for Grafana dashboard provisioning.
# Apply to the namespace where Grafana runs (e.g. monitoring for kube-prometheus-stack):
#   kubectl apply -k deploy/grafana/ -n monitoring
#
# Requires Grafana with the sidecar that discovers ConfigMaps labeled grafana_dashboard=1
# (e.g. kube-prometheus-stack with sidecar.dashboards.enabled=true).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: monitoring

configMapGenerator:
  - name: grafana-dashboard-immich-ml-proxy
    files:
      - immich-ml-proxy.json=dashboard.json
    options:
      labels:
        grafana_dashboard: "1"
