apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich-ml-proxy
  namespace: immich-ml-proxy
  annotations:
    reloader.stakater.com/auto: "true"
  labels:
    app.kubernetes.io/name: immich-ml-proxy
    app.kubernetes.io/component: proxy
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: immich-ml-proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: immich-ml-proxy
        app.kubernetes.io/component: proxy
    spec:
      imagePullSecrets:
        - name: gitlab-pullsecret
      containers:
        - name: proxy
          imagePullPolicy: Always
          image: immich-ml-proxy:latest
          ports:
            - name: http
              containerPort: 3003
          envFrom:
            - configMapRef:
                name: immich-ml-proxy-config
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 500m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
