apiVersion: v1
kind: ConfigMap
metadata:
  name: immich-ml-proxy-config
  namespace: immich-ml-proxy
  labels:
    app.kubernetes.io/name: immich-ml-proxy
data:
  LISTEN_ADDR: ":3003"
  # Placeholders - set to the real GPU/CPU immich-ml Service URLs for this
  # environment via the dev/prd overlays before deploying.
  DEFAULT_BACKEND_URL: "https://immich-ml-gpu.example.internal"
  OCR_BACKEND_URL: "http://immich-ml.immich-ml.svc.cluster.local:3003"
  OCR_TASK_KEYS: "ocr"
  REQUEST_TIMEOUT: "60s"
  MAX_BODY_BYTES: "10485760"
  LOG_LEVEL: "info"
  # Optional per-backend HTTP Basic Auth: DEFAULT_BACKEND_BASIC_AUTH_USERNAME/
  # _PASSWORD and OCR_BACKEND_BASIC_AUTH_USERNAME/_PASSWORD. Not set here -
  # supply them via a Secret and an extra envFrom entry in an overlay, since
  # this ConfigMap is plaintext.
